<style>
:root{
  --bg:#f4f7f6; --surface:#ffffff; --surface-2:#eef5f3;
  --line:#dbe7e4; --teal:#0d9488; --teal-deep:#0f766e;
  --text:#16302d; --muted:#6b8a85;
  --green:#16a34a; --green-bg:#e7f6ec;
  --red:#dc2626; --red-bg:#fdeaea;
  --amber:#b45309; --amber-bg:#fef3c7; --amber-line:#fcd34d;
  --shadow:0 6px 18px rgba(13,148,136,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--text);
  padding:18px 14px 110px; max-width:520px; margin:0 auto; min-height:100vh;
  padding-top:calc(18px + env(safe-area-inset-top));
}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.refresh-btn{flex-shrink:0;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--teal);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s}
.refresh-btn:active{transform:rotate(180deg)}
.refresh-btn.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
header h1{font-size:1.45rem;font-weight:700;letter-spacing:-.5px}
.vbadge{font-size:.6rem;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);padding:2px 7px;border-radius:999px;vertical-align:middle;letter-spacing:0}
header h1 span{color:var(--teal)}
header .sub{font-size:.72rem;color:var(--muted)}

/* Tabs */
.tabs{display:flex;gap:6px;background:var(--surface-2);padding:5px;border-radius:14px;margin-bottom:8px}
.tabs:last-of-type{margin-bottom:16px}
.tab{flex:1;text-align:center;font-size:.78rem;font-weight:600;padding:9px 4px;border-radius:10px;color:var(--muted);cursor:pointer;border:none;background:none}
.tab.active{background:var(--surface);color:var(--teal);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* Disclaimer */
.disclaimer{background:var(--amber-bg);border:1px solid var(--amber-line);border-radius:14px;padding:13px 14px;margin-bottom:14px;font-size:.82rem;color:var(--amber);font-weight:600;display:flex;gap:9px;align-items:flex-start}
.disclaimer .ic{font-size:1.2rem;line-height:1}

/* Summary */
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.scard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px}
.scard .lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.scard .val{font-size:1.35rem;font-weight:700;margin-top:4px}
.scard .half{font-size:.72rem;color:var(--muted);margin-top:3px}
.scard .half b{color:var(--teal);font-weight:700}
.scard.full{grid-column:1/-1;background:var(--teal);border-color:var(--teal)}
.scard.full .lbl{color:rgba(255,255,255,.8)}
.scard.full .val{color:#fff}
.scard.full .half{color:rgba(255,255,255,.9)}
.scard.full .half b{color:#fff}
.val.green{color:var(--green)} .val.red{color:var(--red)}

/* Mode tabs (Totale / A testa) dentro la card piena */
.modetabs{display:flex;gap:4px;background:rgba(255,255,255,.18);padding:4px;border-radius:11px}
.mtab{flex:1;text-align:center;font-size:.74rem;font-weight:700;padding:8px 4px;border-radius:8px;color:rgba(255,255,255,.85);cursor:pointer;border:none;background:none}
.mtab.active{background:#fff;color:var(--teal-deep)}

#status{font-size:.75rem;color:var(--muted);margin:14px 2px 6px}

.list{display:flex;flex-direction:column;gap:12px;margin-top:6px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);position:relative}
.card.warn{border-color:var(--amber-line);border-width:2px}
.card.nocanc-card{border-left:4px solid var(--red)}
.card.excluded{opacity:.72;border-style:dashed}
/* segnaposto da prenotare */
.card.tobook{border:2px solid var(--red);background:#fff5f5}
.tobook-banner{background:var(--red);color:#fff;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:6px 10px;border-radius:9px;text-align:center;margin-bottom:10px}
.tobook-msg{font-size:.78rem;color:var(--red);font-weight:600;margin-top:8px}
/* more toggle */
.more-toggle{width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--teal-deep);font-size:.85rem;font-weight:700;padding:11px;border-radius:11px;cursor:pointer;margin:6px 0 13px;text-align:left}
.hint{font-size:.72rem;color:var(--teal);margin-top:5px;font-weight:600}
.disclaimer.book{background:#fff5f5;border-color:#f5c6c6;color:var(--red)}
/* liste pagamenti/cancellazioni */
.liststat{font-size:.8rem;color:var(--muted);padding:6px 4px 12px}
.liststat b{color:var(--text)}
.lrow{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:9px}
.lrow.late{border-color:#f5c6c6;background:var(--red-bg)}
.lrow-main{flex:1;min-width:0}
.lrow-title{font-size:.92rem;font-weight:700}
.lrow-place{font-size:.74rem;color:var(--teal);font-weight:600;margin-top:2px}
/* itinerario tappe */
.itrow{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:9px}
.itrow.ok{border-left:4px solid var(--green)}
.itrow.miss{border-left:4px solid var(--red);background:#fff7f7}
.itcheck{font-size:1.3rem;line-height:1}
.itmain{flex:1;min-width:0;cursor:pointer}
.ittitle{font-size:1rem;font-weight:700}
.itsub{font-size:.76rem;color:var(--muted);margin-top:3px}
.itnote{font-size:.74rem;color:var(--muted);margin-top:3px;font-style:italic}
.itmezzo{font-size:.74rem;font-weight:600;margin-top:4px;display:inline-block;padding:2px 8px;border-radius:7px}
.itmezzo.okm{color:var(--green);background:var(--green-bg)}
.itmezzo.missm{color:var(--red);background:var(--red-bg)}
.copybtn{width:100%;background:var(--surface);border:1px solid var(--teal);color:var(--teal-deep);font-size:.85rem;font-weight:700;padding:11px;border-radius:11px;cursor:pointer;margin-bottom:12px}
.copybtn:active{background:var(--surface-2)}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 20px;border-radius:999px;font-size:.85rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s;z-index:100;white-space:nowrap}
#toast.show{opacity:.95}
.itright{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.okpill{font-size:.64rem;font-weight:700;color:var(--green);background:var(--green-bg);padding:3px 8px;border-radius:999px;white-space:nowrap}
.misspill{font-size:.64rem;font-weight:700;color:var(--red);background:var(--red-bg);padding:3px 8px;border-radius:999px;white-space:nowrap}
.ittrash{background:none;border:none;color:var(--muted);font-size:.95rem;cursor:pointer;padding:0}
.lrow-sub{font-size:.75rem;color:var(--muted);margin-top:3px}
.lrow.late .lrow-sub{color:var(--red);font-weight:600}
.lrow-amt{font-size:1rem;font-weight:700;color:var(--text);white-space:nowrap;text-align:right;display:flex;flex-direction:column;align-items:flex-end}
.lrow-half{font-size:.68rem;font-weight:700;color:var(--teal);margin-top:2px}
.sito a{color:var(--teal);text-decoration:none;font-weight:600}
.sitebadge{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:600;color:var(--text)}
.sitelogo{width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800}.excl-banner{background:repeating-linear-gradient(45deg,var(--surface-2),var(--surface-2) 8px,#e4ecea 8px,#e4ecea 16px);color:var(--muted);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:5px 10px;border-radius:9px;margin-bottom:10px;text-align:center}
.info.nocanc{color:var(--red);font-weight:700}.daygroup{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 2px 2px}
.typetag{font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
.typetag.allog{background:#e0f2f1;color:var(--teal-deep)}
.typetag.volo{background:#e0e7ff;color:#4338ca}
.typetag.att{background:#fce7f3;color:#be185d}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card .title{font-size:1.05rem;font-weight:700;line-height:1.2}
.card .meta{font-size:.78rem;color:var(--teal);margin-top:2px}
.card .sito{font-size:.72rem;color:var(--muted);margin-top:3px}
.badge{font-size:.68rem;font-weight:700;padding:5px 10px;border-radius:999px;white-space:nowrap;cursor:pointer;border:1px solid transparent;user-select:none}
.badge.paid{background:var(--green-bg);color:var(--green);border-color:#bce5cb}
.badge.unpaid{background:var(--red-bg);color:var(--red);border-color:#f5c6c6}
.badge.loco{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-line)}

/* Calendario / timeline verticale */
.cal{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:10px}
.tl-day{display:grid;grid-template-columns:52px 1fr;gap:12px;padding:9px 4px;align-items:start}
.tl-day+.tl-day{border-top:1px solid var(--line)}
.tl-day.today{background:rgba(13,148,136,.08);border-radius:10px}
.tl-date{display:flex;flex-direction:column;align-items:center;line-height:1.05;padding-top:2px}
.tl-date .wd{font-size:.6rem;color:var(--muted);text-transform:uppercase}
.tl-date .dn{font-size:1.35rem;font-weight:800;color:var(--text)}
.tl-date .mo{font-size:.58rem;color:var(--muted);text-transform:uppercase}
.tl-day.today .tl-date .dn,.tl-day.today .tl-date .wd{color:var(--teal)}
.tl-body{display:flex;flex-direction:column;gap:6px;min-width:0;padding-top:2px}
.tl-ev{display:flex;gap:8px;align-items:center;font-size:.82rem;background:var(--surface-2);border-radius:9px;padding:7px 10px;border-left:3px solid}
.tl-ev.allog{border-color:var(--teal)}
.tl-ev.volo{border-color:#4338ca}
.tl-ev.att{border-color:#be185d}
.tl-ic{font-size:.95rem}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dot.allog{background:var(--teal)}
.dot.volo{background:#4338ca}
.dot.att{background:#be185d}
.cal-legend{display:flex;gap:14px;margin-top:14px;font-size:.72rem;color:var(--muted);flex-wrap:wrap;justify-content:center}
.cal-legend span{display:inline-flex;align-items:center;gap:5px}
.cal-empty{text-align:center;color:var(--muted);padding:30px;font-size:.85rem}
.card .row{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-top:12px;gap:8px}
.card .row b{color:var(--text);font-weight:600}
.card .price{font-size:1.15rem;font-weight:700;color:var(--text);margin-top:10px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.card .price .loc{font-size:.8rem;font-weight:600;color:var(--muted)}
.card .price .split{font-size:.74rem;font-weight:600;color:var(--teal);margin-left:auto}
.card .price .excl{font-size:.7rem;font-weight:600;color:var(--muted);margin-left:auto;background:var(--surface-2);padding:3px 8px;border-radius:7px}
.card .info{font-size:.72rem;color:var(--muted);margin-top:8px}
.card .info b{color:var(--amber);font-weight:600}
.card .info.pay b{color:var(--red);font-weight:700}
.card .warnflag{font-size:.74rem;font-weight:700;color:var(--amber);background:var(--amber-bg);border-radius:9px;padding:7px 10px;margin-top:10px;display:flex;gap:7px;align-items:center}
.card .notes{font-size:.78rem;color:var(--muted);margin-top:8px;font-style:italic}
.card .actions{display:flex;gap:8px;margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
.btn-sm{flex:1;font-size:.8rem;font-weight:600;padding:9px;border-radius:11px;border:1px solid var(--line);background:var(--surface-2);color:var(--text);cursor:pointer}
.btn-sm.del{color:var(--red);border-color:#f3d3d3}

.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:.9rem}

.fab{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--teal);color:#fff;border:none;width:60px;height:60px;border-radius:50%;
  font-size:2rem;font-weight:300;line-height:1;box-shadow:0 6px 20px rgba(13,148,136,.4);cursor:pointer;z-index:20}
.fab[disabled]{opacity:.35;pointer-events:none}

.overlay{position:fixed;inset:0;background:rgba(22,48,45,.4);display:none;align-items:flex-end;justify-content:center;z-index:30}
.overlay.show{display:flex}
.modal{background:var(--surface);width:100%;max-width:520px;border-radius:22px 22px 0 0;padding:22px 18px 30px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.1rem;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:5px}
.field input,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px;color:var(--text);font-size:.95rem;font-family:inherit}
.field textarea{resize:vertical;min-height:60px}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--teal)}
.field.check{display:flex;align-items:center;gap:9px}
.field.check input{width:20px;height:20px;accent-color:var(--teal)}
.field.check.warn input{accent-color:var(--amber)}
.field.check label{margin:0}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three{display:grid;grid-template-columns:2fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;padding:13px;border-radius:13px;border:none;font-size:.95rem;font-weight:700;cursor:pointer}
.btn.primary{background:var(--teal);color:#fff}
.btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
.hide{display:none!important}

/* Editor tratte volo */
.leg-section{margin:14px 0;padding:12px;background:var(--surface-2);border-radius:13px}
.leg-head{font-size:.85rem;font-weight:700;color:var(--teal-deep);margin-bottom:10px}
.leg{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:10px;position:relative}
.leg .legnum{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.leg .legdel{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--red);font-size:.95rem;cursor:pointer;padding:2px}
.leg .two{margin-bottom:8px}
.leg .field{margin-bottom:8px}
.leg .field label{font-size:.68rem}
.leg .field input{padding:9px;font-size:.9rem}
.add-leg{width:100%;background:none;border:1px dashed var(--teal);color:var(--teal);font-size:.82rem;font-weight:600;padding:9px;border-radius:10px;cursor:pointer}

/* Rendering volo card */
.fl-block{margin-top:12px;background:var(--surface-2);border-radius:12px;padding:11px}
.fl-title{font-size:.74rem;font-weight:700;color:var(--teal-deep);margin-bottom:8px}
.fl-leg{border-left:2px solid var(--line);padding-left:10px;margin-left:3px}
.fl-row{display:flex;justify-content:space-between;align-items:baseline;font-size:.82rem;gap:8px;margin:2px 0}
.fl-row .ap{font-weight:700;color:var(--text)}
.fl-row .tm{color:var(--muted);text-align:right}
.fl-row .home{color:var(--teal);font-weight:600}
.fl-dur{font-size:.72rem;color:var(--muted);margin:2px 0 2px 10px}
.fl-scalo{font-size:.74rem;font-weight:600;color:var(--amber);background:var(--amber-bg);border-radius:8px;padding:5px 9px;margin:8px 0;display:inline-block}

/* Viaggi */
.back{display:inline-flex;align-items:center;gap:5px;font-size:.8rem;font-weight:600;color:var(--teal);background:none;border:none;cursor:pointer;padding:6px 0;margin-bottom:6px}
.trip-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow);cursor:pointer;position:relative;margin-bottom:12px;transition:transform .1s}
.trip-card:active{transform:scale(.99)}
.trip-card .tname{font-size:1.15rem;font-weight:700}
.trip-card .tdates{font-size:.8rem;color:var(--muted);margin-top:4px}
.trip-card .tmeta{font-size:.78rem;color:var(--teal);margin-top:10px;font-weight:600}
.trip-card .tdel{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:4px}
.trip-card .twarn{font-size:.72rem;color:var(--amber);font-weight:700;margin-top:8px}
</style>
</head>
<body>
<header>
  <div style="flex:1">
    <button class="back hide" id="backBtn" onclick="goTrips()">← I miei viaggi</button>
    <h1>Itine<span>rario</span> <span class="vbadge" id="vbadge">v4.14.0</span></h1>
    <div class="sub" id="headsub">I tuoi viaggi</div>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="forceUpdate()" title="Aggiorna app">⟳</button>
</header>

<!-- VISTA: LISTA VIAGGI -->
<div id="view-trips">
  <div id="trips-status">Caricamento…</div>
  <div id="trips-list"></div>
</div>

<!-- VISTA: DETTAGLIO VIAGGIO -->
<div id="view-detail" class="hide">
<div class="tabs">
  <button class="tab active" data-tab="tutto" onclick="setTab('tutto')">📋 Tutto</button>
  <button class="tab" data-tab="itinerario" onclick="setTab('itinerario')">🗺️ Itinerario</button>
  <button class="tab" data-tab="calendario" onclick="setTab('calendario')">📅 Calendario</button>
</div>
<div class="tabs">
  <button class="tab" data-tab="alloggi" onclick="setTab('alloggi')">🏨 Alloggi</button>
  <button class="tab" data-tab="voli" onclick="setTab('voli')">✈️ Voli</button>
  <button class="tab" data-tab="attivita" onclick="setTab('attivita')">🎟️ Attività</button>
</div>
<div class="tabs">
  <button class="tab" data-tab="pagamenti" onclick="setTab('pagamenti')">💳 Pagamenti</button>
  <button class="tab" data-tab="cancellazioni" onclick="setTab('cancellazioni')">⏳ Cancellazioni</button>
</div>

<div id="disclaimer"></div>
<button class="back" onclick="editTrip()" style="margin-bottom:10px">✎ Modifica dettagli viaggio</button>

<div class="summary">
  <div class="scard full" style="padding-bottom:12px">
    <div class="modetabs">
      <button class="mtab" id="mt-tot" onclick="setMode('tot')">Totale viaggio</button>
      <button class="mtab active" id="mt-half" onclick="setMode('half')">A testa</button>
    </div>
    <div class="val" id="s-tot" style="margin-top:10px">€0</div>
  </div>
  <div class="scard"><div class="lbl">Pagato</div><div class="val green" id="s-paid">€0</div></div>
  <div class="scard"><div class="lbl">Da pagare</div><div class="val red" id="s-due">€0</div></div>
</div>

<div id="status">Caricamento…</div>
<div id="calendar" class="hide"></div>
<div class="list" id="list"></div>
</div><!-- /view-detail -->

<button class="fab" id="fab" onclick="onFab()">+</button>

<!-- MODAL VIAGGIO -->
<div class="overlay" id="overlay-trip">
  <div class="modal">
    <h2 id="trip-modal-title">Nuovo viaggio</h2>
    <input type="hidden" id="t-id">
    <div class="field"><label>Nome viaggio</label><input id="t-nome" placeholder="es. Giappone 2026"></div>
    <div class="two">
      <div class="field"><label>Dal</label><input type="date" id="t-inizio"></div>
      <div class="field"><label>Al</label><input type="date" id="t-fine"></div>
    </div>
    <div class="field"><label>Note</label><textarea id="t-note" placeholder="Destinazioni, compagni di viaggio…"></textarea></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeTripForm()">Annulla</button>
      <button class="btn primary" id="trip-save-btn" onclick="saveTrip()">Salva</button>
    </div>
  </div>
</div>

<!-- MODAL TAPPA ITINERARIO -->
<div class="overlay" id="overlay-tappa">
  <div class="modal">
    <h2 id="tappa-modal-title">Nuova tappa</h2>
    <input type="hidden" id="tp-id">
    <div class="field"><label>Tappa / luogo</label><input id="tp-nome" placeholder="es. Ubud"></div>
    <div class="two">
      <div class="field"><label>Dal (gg/mm)</label><input id="tp-inizio" class="datein" placeholder="gg/mm" inputmode="numeric" maxlength="5"></div>
      <div class="field"><label>Al (gg/mm)</label><input id="tp-fine" class="datein" placeholder="gg/mm" inputmode="numeric" maxlength="5"></div>
    </div>
    <div class="field"><label>Note</label><input id="tp-note" placeholder="es. zona risaie, vicino centro…"></div>
    <div class="field"><label>Come ci arrivo (spostamento)</label>
      <select id="tp-mezzo" style="width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px;color:var(--text);font-size:.95rem;font-family:inherit">
        <option value="">— nessuno —</option>
        <option value="volo">✈️ Volo</option>
        <option value="traghetto">⛴️ Traghetto</option>
        <option value="treno">🚆 Treno</option>
        <option value="bus">🚌 Bus</option>
        <option value="taxi">🚕 Taxi / transfer</option>
        <option value="auto">🚗 Auto</option>
        <option value="piedi">🚶 A piedi</option>
      </select>
    </div>
    <div class="field check"><input type="checkbox" id="tp-mezzoprenotato"><label>✅ Spostamento già prenotato</label></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeTappaForm()">Annulla</button>
      <button class="btn primary" id="tappa-save-btn" onclick="saveTappa()">Salva</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Nuova voce</h2>
    <input type="hidden" id="f-id">
    <input type="hidden" id="f-tipo">

    <div class="field" id="fld-tiposel"><label>Tipo voce</label>
      <select id="f-tiposel" onchange="applyTypeUI(this.value)" style="width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px;color:var(--text);font-size:.95rem;font-family:inherit">
        <option value="alloggio">🏨 Alloggio</option>
        <option value="volo">✈️ Volo</option>
        <option value="attivita">🎟️ Attività</option>
      </select>
    </div>

    <!-- Campi comuni: nome -->
    <div class="field"><label id="lbl-nome">Nome</label><input id="f-nome" placeholder=""></div>

    <!-- SEGNAPOSTO / DA PRENOTARE (alloggi e attività) -->
    <div class="field check hide" id="fld-daprenotare"><input type="checkbox" id="f-daprenotare" onchange="toggleDaPrenotare()"><label>📍 Solo segnaposto (idea, ancora da prenotare)</label></div>

    <!-- TAPPA collegata (alloggi e attività) -->
    <div class="grp hide" id="grp-tappa">
      <div class="field"><label>Tappa <span style="font-weight:400;color:var(--muted)">(dall'itinerario)</span></label>
        <select id="f-tappaid" onchange="onTappaSelect()" style="width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px;color:var(--text);font-size:.95rem;font-family:inherit">
          <option value="">— Scegli una tappa —</option>
          <option value="__new">+ Nuova tappa (scrivi sotto)</option>
        </select>
      </div>
      <div class="field hide" id="fld-tappamanuale"><label>Nome tappa / luogo</label><input id="f-tappa" placeholder="es. Lisbona"></div>
    </div>

    <!-- ALLOGGIO -->
    <div class="grp hide" id="grp-allog"></div>

    <!-- VOLO -->
    <div class="grp hide" id="grp-volo">
      <div class="field"><label>Compagnia</label><input id="f-compagnia" placeholder="es. ITA Airways"></div>
      <div class="field check"><input type="checkbox" id="f-andataritorno" onchange="toggleRitorno()"><label>🔁 Andata e ritorno</label></div>
      <div class="leg-section">
        <div class="leg-head">✈️ Andata</div>
        <div id="legs-andata"></div>
        <button type="button" class="add-leg" onclick="addLeg('andata')">+ Aggiungi tratta (scalo)</button>
      </div>
      <div class="leg-section hide" id="sec-ritorno">
        <div class="leg-head">🔙 Ritorno</div>
        <div id="legs-ritorno"></div>
        <button type="button" class="add-leg" onclick="addLeg('ritorno')">+ Aggiungi tratta (scalo)</button>
      </div>
    </div>

    <!-- ATTIVITÀ -->
    <div class="grp hide" id="grp-att">
      <div class="field"><label>Luogo specifico <span style="font-weight:400;color:var(--muted)">(opzionale)</span></label><input id="f-luogo" placeholder="es. Tempio Uluwatu"></div>
      <div class="field"><label>Durata</label><input id="f-durata" placeholder="es. 3 ore"></div>
    </div>

    <!-- ===== ESSENZIALI ===== -->
    <!-- Date (giorno/mese: l'anno è quello del viaggio) -->
    <div class="two" id="row-duedate">
      <div class="field"><label id="lbl-d1">Data inizio (gg/mm)</label><input id="f-inizio" class="datein" placeholder="gg/mm" inputmode="numeric" maxlength="5"></div>

// converte 'gg/mm' (o 'ggmm') in ISO 'YYYY-MM-DD' scegliendo l'anno giusto (gestisce viaggi a cavallo di capodanno)
function ddmmToIso(s){
  if(!s) return null;
  s=s.trim().replace(/[^\d/]/g,'');
  let dd,mm;
  if(s.includes('/')){ [dd,mm]=s.split('/'); }
  else if(s.length===4){ dd=s.slice(0,2); mm=s.slice(2,4); }
  else if(s.length===3){ dd=s.slice(0,1); mm=s.slice(1,3); }
  else return null;
  dd=parseInt(dd,10); mm=parseInt(mm,10);
  if(!dd||!mm||dd>31||mm>12) return null;
  let year=tripYear();
  // se il viaggio inizia (es.) a dicembre e questo mese è gennaio-giugno, è l'anno dopo
  const sm=tripStartMonth();
  if(currentTrip && currentTrip.data_fine){
    // uso direttamente l'intervallo del viaggio per disambiguare

  } else if(sm>=7 && mm<sm){ year=year+1; }
  return `${year}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
}

// Offset (minuti) di un timezone IANA per un dato istante
function tzOffsetMin(tz, date){
  try{
    const dtf = new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const p = {}; dtf.formatToParts(date).forEach(x=>p[x.type]=x.value);
    const asUTC = Date.UTC(p.year,p.month-1,p.day,p.hour,p.minute,p.second);
    return Math.round((asUTC - date.getTime())/60000);
  }catch(e){ return null; }
}
// Converte "data + ora locale di un aeroporto" nell'orario dell'aeroporto di origine (homeTz)
function localToHome(dateStr, timeStr, localTz, homeTz){
  if(!dateStr||!timeStr||!localTz||!homeTz) return null;
  // costruisco l'istante reale: prendo l'ora "wall clock" locale e trovo l'UTC corrispondente
  const [Y,M,D]=dateStr.split('-').map(Number); const [h,m]=timeStr.split(':').map(Number);
  const guess = new Date(Date.UTC(Y,M-1,D,h,m));
  const off = tzOffsetMin(localTz, guess); if(off==null) return null;
  const realUTC = new Date(guess.getTime() - off*60000); // istante vero
  // ora come si vede nel fuso di casa
  const hOff = tzOffsetMin(homeTz, realUTC); if(hOff==null) return null;
  const homeWall = new Date(realUTC.getTime() + hOff*60000);
  return { time: pad(homeWall.getUTCHours())+':'+pad(homeWall.getUTCMinutes()), flag: flagOf(homeTz), realUTC };
}
function pad(n){ return String(n).padStart(2,'0'); }
function durBetween(d1,t1,tz1,d2,t2,tz2){
  if(!d1||!t1||!d2||!t2) return null;
  const i1=instantOf(d1,t1,tz1), i2=instantOf(d2,t2,tz2);
  if(!i1||!i2) return null;
  let min=Math.round((i2-i1)/60000); if(min<0) return null;
  const h=Math.floor(min/60), mm=min%60;
  return (h?h+'h ':'')+(mm?mm+'m':(h?'':'0m'));
}
function instantOf(dateStr,timeStr,tz){
  if(!dateStr||!timeStr) return null;
  const [Y,M,D]=dateStr.split('-').map(Number); const [h,m]=timeStr.split(':').map(Number);
  if(!tz){ return Date.UTC(Y,M-1,D,h,m); } // senza tz: trattato come "naive", durate relative ok solo se entrambi senza tz
  const guess=new Date(Date.UTC(Y,M-1,D,h,m));
  const off=tzOffsetMin(tz,guess); if(off==null) return Date.UTC(Y,M-1,D,h,m);
  return guess.getTime()-off*60000;
}

    renderTrips(cancMap);

    $('trips-status').innerHTML='⚠️ Errore di connessione: '+esc(e.message||String(e))+'<br><br>Verifica URL e chiave Supabase e la connessione internet.';

// Forza il ricaricamento bypassando la cache (utile per la web app installata su iOS)
async function forceUpdate(){
  const btn=$('refreshBtn'); if(btn) btn.classList.add('spin');
  // 1) provo a svuotare le cache del browser/service worker
  try{
    if(window.caches && caches.keys){ const ks=await caches.keys(); await Promise.all(ks.map(k=>caches.delete(k))); }
  }catch(e){}
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.getRegistrations){
      const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.unregister()));
    }
  }catch(e){}
  // 2) ricarico con un parametro anti-cache, così iOS scarica la versione nuova
  const u=new URL(window.location.href);
  u.searchParams.set('v', Date.now());
  window.location.replace(u.toString());
}

function tipoOfTab(t){ return t==='alloggi'?'alloggio':t==='voli'?'volo':t==='attivita'?'attivita':null; }

function render(){
  const isCal = tab==='calendario';
  const isList = (tab==='pagamenti'||tab==='cancellazioni'||tab==='itinerario');
  const filtered = (tab==='tutto'||isCal||isList) ? data : data.filter(r=>r.tipo===tipoOfTab(tab));

  // Totali sul set filtrato (per pagamenti/cancellazioni uso tutti i dati)
  const totSet = isList ? data : filtered;
  let tot=0, paid=0;
  totSet.forEach(r=>{
    if(r.escluso_totale) return;
    const p=Number(r.prezzo)||0;
    tot+=p;
    if(r.stato_pagamento==='pagato'||r.pagato) paid+=p;
    else if(r.stato_pagamento==='acconto') paid+=Math.min(Number(r.acconto)||0, p);
  });
  const due=tot-paid;
  const d = mode==='half' ? 2 : 1;
  $('s-tot').textContent=eur(tot/d);
  $('s-paid').textContent=eur(paid/d);
  $('s-due').textContent=eur(due/d);
  $('status').textContent = filtered.length ? filtered.length+' voci' : '';

  // Disclaimer cancellazioni (sempre globale, su tutti i dati)
  const toCancel = data.filter(r=>r.valuta_cancellazione);
  const toBook = data.filter(r=>r.da_prenotare);
  let disc='';
  if(toCancel.length) disc+=`<div class="disclaimer"><span class="ic">⚠️</span><span>Hai ${toCancel.length} ${toCancel.length===1?'prenotazione':'prenotazioni'} da valutare per la cancellazione (doppi alloggi): ${toCancel.map(r=>esc(r.nome_hotel)).join(', ')}.</span></div>`;
  if(toBook.length) disc+=`<div class="disclaimer book"><span class="ic">📍</span><span>Hai ${toBook.length} ${toBook.length===1?'alloggio ancora da prenotare':'alloggi ancora da prenotare'}: ${toBook.map(r=>esc(r.tappa||r.nome_hotel)).join(', ')}.</span></div>`;
  $('disclaimer').innerHTML=disc;

  // Switch viste
  $('calendar').classList.toggle('hide', !isCal);
  $('list').classList.toggle('hide', isCal);
  if(isCal){ renderCalendar(); return; }

  const list=$('list');
  if(tab==='itinerario'){ list.innerHTML=renderItinerario(); return; }
  if(tab==='pagamenti'){ list.innerHTML=renderPagamenti(); return; }
  if(tab==='cancellazioni'){ list.innerHTML=renderCancellazioni(); return; }

  if(!filtered.length){ list.innerHTML='<div class="empty">Nessuna voce.<br>'+(tab==='tutto'?'Aggiungi qualcosa dalle altre tab.':'Tocca + per iniziare.')+'</div>'; return; }

  // Ordina cronologicamente per data_inizio
  const sorted=[...filtered].sort((a,b)=>(a.data_inizio||'9999').localeCompare(b.data_inizio||'9999'));

  let html=''; let lastDay=null;
  if(tab==='tutto') html+='<button class="copybtn" onclick="copiaPrenotazioni()">📋 Copia prenotazioni</button>';
  sorted.forEach(r=>{
    if(tab==='tutto'){
      const dk=r.data_inizio||'';
      if(dk!==lastDay){ lastDay=dk; html+=`<div class="daygroup">${dk?flong(dk):'Data da definire'}</div>`; }
    }
    html+=cardHtml(r);
  });
  list.innerHTML=html;
}

// ---------- CALENDARIO ----------
function isValidISO(d){ return typeof d==='string' && /^\d{4}-\d{2}-\d{2}$/.test(d) && !isNaN(new Date(d+'T00:00:00').getTime()); }
function daysBetween(a,b){ if(!isValidISO(a)||!isValidISO(b)) return 0; return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000); }
function addDays(d,n){ if(!isValidISO(d)) return d; const x=new Date(d+'T00:00:00'); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); }
let calDayMap={};   // 'YYYY-MM-DD' -> [{tipo,label,...}]
let calSelected=null;

function buildDayMap(){
  const map={};
  const push=(d,obj)=>{ if(!isValidISO(d))return; (map[d]=map[d]||[]).push(obj); };
  data.forEach(r=>{
    if(r.tipo==='alloggio' && isValidISO(r.data_inizio)){
      const end=isValidISO(r.data_fine)?r.data_fine:r.data_inizio;
      let n=Math.max(daysBetween(r.data_inizio,end),0)||0;
      if(n>366) n=366; // guardia anti-loop
      const lastNight = n>0 ? addDays(r.data_inizio,n-1) : r.data_inizio;
      let d=r.data_inizio, guard=0;
      while(d<=lastNight && guard<400){
        push(d,{tipo:'allog', label:r.tappa||r.nome_hotel, role:(d===r.data_inizio?'in':'stay')});
        d=addDays(d,1); guard++;
      }
      push(end,{tipo:'allog', label:r.tappa||r.nome_hotel, role:'out'});
    } else if(r.tipo==='volo'){
      const tr=parseTratte(r.tratte);
      const legs=[...tr.andata,...tr.ritorno].filter(l=>isValidISO(l.data_dep));
      if(legs.length) legs.forEach(lg=>push(lg.data_dep,{tipo:'volo',label:`${lg.da}→${lg.a}`,time:lg.ora_dep||''}));
      else if(isValidISO(r.data_inizio)) push(r.data_inizio,{tipo:'volo',label:r.nome_hotel,time:''});
    } else if(r.tipo==='attivita' && isValidISO(r.data_inizio)){
      push(r.data_inizio,{tipo:'att',label:r.nome_hotel+(r.tappa?' · '+r.tappa:(r.luogo?' · '+r.luogo:'')),time:r.ora_inizio||''});
    }
  });
  return map;
}

function renderCalendar(){
  const cal=$('calendar');
  try{
    calDayMap=buildDayMap();
    const days=Object.keys(calDayMap).filter(isValidISO).sort();
    if(!days.length){
      cal.innerHTML='<div class="cal-empty">Nessuna data inserita.<br>Aggiungi prenotazioni con le date per vederle qui.</div>'; return;
    }
    const today=new Date().toISOString().slice(0,10);
    let html='<div class="tl">';
    days.forEach(d=>{
      const dt=new Date(d+'T00:00:00');
      const isToday=d===today;
      const wd=dt.toLocaleDateString('it-IT',{weekday:'short'});
      const dn=dt.getDate();
      const mo=dt.toLocaleDateString('it-IT',{month:'short'});
      const items=calDayMap[d]||[];
      let rows='';
      items.forEach(x=>{
        let ic,cls,txt;
        if(x.tipo==='allog'){ ic='🏨'; cls='allog'; const ruolo=x.role==='out'?' · check-out':x.role==='in'?' · check-in':''; txt=esc(x.label)+ruolo; }
        else if(x.tipo==='volo'){ ic=x.icon||'✈️'; cls='volo'; txt=esc(x.label)+(x.time?' · '+esc(x.time):''); }
        else { ic='🎟️'; cls='att'; txt=esc(x.label)+(x.time?' · '+esc(x.time):''); }
        rows+=`<div class="tl-ev ${cls}"><span class="tl-ic">${ic}</span><span>${txt}</span></div>`;
      });
      html+=`<div class="tl-day${isToday?' today':''}">
        <div class="tl-date"><span class="wd">${wd}</span><span class="dn">${dn}</span><span class="mo">${mo}</span></div>
        <div class="tl-body">${rows}</div>
      </div>`;
    });
    html+='</div>';
    const legend='<div class="cal-legend"><span><i class="dot allog"></i>Alloggi</span><span><i class="dot volo"></i>Voli/spostamenti</span><span><i class="dot att"></i>Attività</span></div>';
    cal.innerHTML='<div class="cal">'+html+legend+'</div>';
  }catch(e){
    cal.innerHTML='<div class="cal-empty">⚠️ Errore: '+esc(e.message)+'<br>Controlla le date inserite.</div>';
  }
}

function siteBadge(sito){
  if(!sito) return '';
  const s=norm(sito);

  let bg,fg='#fff',ini,nome;
  if(s.includes('booking')){ bg='#003580'; ini='B'; nome='Booking'; }
  else if(s.includes('airbnb')){ bg='#ff385c'; ini='A'; nome='Airbnb'; }
  else if(s.includes('expedia')){ bg='#fbcc33'; fg='#1a2b49'; ini='E'; nome='Expedia'; }
  else if(s.includes('trip.com')||s==='trip'||s.includes('trip ')){ bg='#287dfa'; ini='T'; nome='Trip.com'; }
  else if(s.includes('hotels.com')){ bg='#d32f2f'; ini='H'; nome='Hotels.com'; }

function esc(s){return (s||'').toString().replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));}

// ---------- LISTE PAGAMENTI / CANCELLAZIONI ----------
function postoOf(r){
  if(r.tipo==='alloggio') return r.tappa||'';
  if(r.tipo==='attivita') return r.tappa||r.luogo||'';
  if(r.tipo==='volo'){ const tr=parseTratte(r.tratte); const a=[...tr.andata]; return a.length?`${a[0].da}→${a[a.length-1].a}`:''; }
  return '';
}
function renderPagamenti(){
  // voci con qualcosa ancora da pagare: da pagare, acconto, e pagare in loco
  const items=data.filter(r=>!r.escluso_totale && !r.da_prenotare && (r.stato_pagamento==='dapagare'||r.stato_pagamento==='acconto'||r.stato_pagamento==='inloco'||(!r.stato_pagamento&&!r.pagato)))
    .map(r=>{
      const p=Number(r.prezzo)||0; const acc=r.stato_pagamento==='acconto'?(Number(r.acconto)||0):0;
      // data di riferimento per l'ordinamento: in loco -> check-in; altrimenti -> scadenza pagamento
      const refDate = r.stato_pagamento==='inloco' ? (r.data_inizio||'9999') : (r.data_pagamento||'9999');
      return {...r, resto:Math.max(p-acc,0), refDate};
    })
    .filter(r=>r.resto>0)
    .sort((a,b)=>a.refDate.localeCompare(b.refDate));
  if(!items.length) return '<div class="empty">🎉 Nessun pagamento in sospeso.</div>';
  const tot=items.reduce((s,r)=>s+r.resto,0);
  let html=`<div class="liststat">Totale ancora da pagare: <b>${eur(tot)}</b> · a testa ${eur(tot/2)}</div>`;
  const oggi=new Date().toISOString().slice(0,10);
  items.forEach(r=>{
    const inloco=r.stato_pagamento==='inloco';
    const scaduto = !inloco && r.data_pagamento && r.data_pagamento < oggi;
    const posto=postoOf(r);
    let sub;
    if(inloco) sub=r.data_inizio?`📍 in loco al check-in (<b>${fdate(r.data_inizio)}</b>)`:'📍 da pagare in loco';
    else if(r.data_pagamento) sub=(scaduto?'⚠️ scaduto il ':'entro ')+'<b>'+fdate(r.data_pagamento)+'</b>';
    else sub='senza scadenza';
    if(r.stato_pagamento==='acconto') sub+=' · acconto '+eur(Number(r.acconto)||0);
    html+=`<div class="lrow ${scaduto?'late':''}">
      <div class="lrow-main">
        <div class="lrow-title"><span class="typetag ${TYPE_TAGCLASS[r.tipo]}">${TYPE_LABELS[r.tipo]}</span> ${esc(r.nome_hotel)}</div>
        ${posto?`<div class="lrow-place">📍 ${esc(posto)}</div>`:''}
        <div class="lrow-sub">${sub}</div>
      </div>
      <div class="lrow-amt">${eur(r.resto)}<span class="lrow-half">tu: ${eur(r.resto/2)}</span></div>
    </div>`;
  });
  return html;
}
function renderCancellazioni(){
  const items=data.filter(r=>r.tipo==='alloggio' && !r.non_cancellabile && r.scadenza_cancellazione)
    .sort((a,b)=>a.scadenza_cancellazione.localeCompare(b.scadenza_cancellazione));
  const noncanc=data.filter(r=>r.tipo==='alloggio' && r.non_cancellabile);
  if(!items.length && !noncanc.length) return '<div class="empty">Nessuna scadenza di cancellazione registrata.</div>';
  let html='';
  if(items.length){
    const oggi=new Date().toISOString().slice(0,10);
    items.forEach(r=>{
      const scaduto=r.scadenza_cancellazione<oggi;
      const gg=daysBetween(oggi,r.scadenza_cancellazione);
      html+=`<div class="lrow ${scaduto?'late':''}">
        <div class="lrow-main">
          <div class="lrow-title">${esc(r.nome_hotel)}${r.valuta_cancellazione?' ⚠️':''}</div>
          ${r.tappa?`<div class="lrow-place">📍 ${esc(r.tappa)}</div>`:''}
          <div class="lrow-sub">${scaduto?'scaduta il ':'cancellabile entro '}<b>${fdate(r.scadenza_cancellazione)}</b>${!scaduto&&gg>=0?` · ${gg===0?'oggi!':'tra '+gg+'gg'}`:''}</div>
        </div>
        <div class="lrow-amt">${eur(Number(r.prezzo)||0)}</div>
      </div>`;
    });
  }
  if(noncanc.length){
    html+=`<div class="liststat" style="margin-top:14px">🔒 Non cancellabili</div>`;
    noncanc.forEach(r=>{
      html+=`<div class="lrow"><div class="lrow-main"><div class="lrow-title">${esc(r.nome_hotel)}</div>${r.tappa?`<div class="lrow-place">📍 ${esc(r.tappa)}</div>`:''}<div class="lrow-sub">non rimborsabile</div></div><div class="lrow-amt">${eur(Number(r.prezzo)||0)}</div></div>`;
    });
  }

// ---------- ITINERARIO (tappe) ----------
function copiaTappe(){
  const sorted=[...tappe].sort((a,b)=>(a.data_inizio||'9999').localeCompare(b.data_inizio||'9999'));
  const MEZZI={volo:'in volo',traghetto:'in traghetto',treno:'in treno',bus:'in bus',taxi:'in taxi/transfer',auto:'in auto',piedi:'a piedi'};
  let txt=`ITINERARIO — ${currentTrip?currentTrip.nome:''}\n`;
  if(currentTrip && (currentTrip.data_inizio||currentTrip.data_fine)) txt+=`(${fdate(currentTrip.data_inizio)} → ${fdate(currentTrip.data_fine)})\n`;
  txt+='\n';
  sorted.forEach((t,i)=>{
    const range=(t.data_inizio||t.data_fine)?`${fdate(t.data_inizio)} → ${fdate(t.data_fine)}`:'date da definire';
    txt+=`${i+1}. ${t.nome} (${range})`;
    if(t.mezzo) txt+=` — arrivo ${MEZZI[t.mezzo]||t.mezzo}${t.mezzo_prenotato?' [prenotato]':' [DA PRENOTARE]'}`;
    const ok=tappaCoperta(t); txt+= ok?' — alloggio OK':' — alloggio DA PRENOTARE';
    if(t.note) txt+=`\n   note: ${t.note}`;
    txt+='\n';
  });
  copyText(txt.trim(), 'Itinerario copiato!');
}
function copiaPrenotazioni(){
  const ordered=[...data].filter(r=>r.tipo).sort((a,b)=>(a.data_inizio||'9999').localeCompare(b.data_inizio||'9999'));
  let txt=`PRENOTAZIONI — ${currentTrip?currentTrip.nome:''}\n\n`;
  const label={alloggio:'🏨 ALLOGGIO',volo:'✈️ VOLO',attivita:'🎟️ ATTIVITÀ'};
  ordered.forEach(r=>{
    const posto=postoOf(r);
    txt+=`${label[r.tipo]||r.tipo}: ${r.nome_hotel}`;
    if(posto) txt+=` — ${posto}`;
    if(r.tipo==='alloggio' && (r.data_inizio||r.data_fine)) txt+=` (${fdate(r.data_inizio)} → ${fdate(r.data_fine)})`;
    else if(r.data_inizio) txt+=` (${fdate(r.data_inizio)})`;
    if(r.da_prenotare) txt+=' [DA PRENOTARE]';
    if(r.prezzo && !r.da_prenotare) txt+=` — ${eur(Number(r.prezzo)||0)}`;
    if(r.sito_prenotazione) txt+=` — ${r.sito_prenotazione}`;
    if(r.link) txt+=`\n   link: ${r.link}`;
    txt+='\n';
  });
  copyText(txt.trim(), 'Prenotazioni copiate!');
}
function copyText(txt, msg){
  const done=()=>{ toast(msg); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done));
  } else fallbackCopy(txt,done);
}
function fallbackCopy(txt,done){
  const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){ alert('Copia non riuscita, seleziona manualmente:\n\n'+txt); }
  document.body.removeChild(ta);
}
function toast(msg){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.textContent=msg; t.className='show';
  clearTimeout(window.__toastT); window.__toastT=setTimeout(()=>{ t.className=''; },2200);
}

function norm(s){ return (s||'').toString().trim().toLowerCase(); }
// una tappa è "coperta" se esiste un alloggio prenotato (non segnaposto) con tappa corrispondente
function tappaCoperta(t){
  return data.some(r=>r.tipo==='alloggio' && !r.da_prenotare && (
    (r.tappa_id && r.tappa_id===t.id) ||
    (!r.tappa_id && norm(r.tappa)===norm(t.nome) && norm(t.nome)!=='')
  ));
}
function renderItinerario(){
  const sorted=[...tappe].sort((a,b)=>(a.data_inizio||'9999').localeCompare(b.data_inizio||'9999'));
  let html='<button class="copybtn" onclick="copiaTappe()">📋 Copia itinerario</button>';
  html+='<div class="liststat">Le tue tappe — spunta verde = alloggio già prenotato</div>';
  if(!sorted.length){
    html+='<div class="empty">Nessuna tappa.<br>Tocca + per aggiungere la prima tappa del viaggio.</div>';
  } else {
    let nCoperte=0;
    sorted.forEach(t=>{
      const ok=tappaCoperta(t); if(ok) nCoperte++;
      const range=(t.data_inizio||t.data_fine)?`${fdate(t.data_inizio)} → ${fdate(t.data_fine)}`:'date da definire';
      const notti=(t.data_inizio&&t.data_fine)?Math.max(daysBetween(t.data_inizio,t.data_fine),0):0;
      const MEZZI={volo:'✈️ Volo',traghetto:'⛴️ Traghetto',treno:'🚆 Treno',bus:'🚌 Bus',taxi:'🚕 Taxi/transfer',auto:'🚗 Auto',piedi:'🚶 A piedi'};
      const mezzoTxt = t.mezzo ? `<div class="itmezzo ${t.mezzo_prenotato?'okm':'missm'}">${MEZZI[t.mezzo]||t.mezzo} · ${t.mezzo_prenotato?'✅ prenotato':'⬜ da prenotare'}</div>` : '';
      html+=`<div class="itrow ${ok?'ok':'miss'}">
        <div class="itcheck">${ok?'✅':'⬜'}</div>
        <div class="itmain" onclick='editTappa(${JSON.stringify(t).replace(/'/g,"&#39;")})'>
          <div class="ittitle">${esc(t.nome)}</div>
          <div class="itsub">📅 ${range}${notti?` · ${notti} nott${notti===1?'e':'i'}`:''}</div>
          ${mezzoTxt}
          ${t.note?`<div class="itnote">${esc(t.note)}</div>`:''}
        </div>
        <div class="itright">
          ${ok?'<span class="okpill">prenotato</span>':'<span class="misspill">da prenotare</span>'}
          <button class="ittrash" onclick="delTappaConfirm('${t.id}')">🗑</button>
        </div>
      </div>`;
    });
    html=html.replace('<div class="liststat">Le tue tappe — spunta verde = alloggio già prenotato</div>', `<div class="liststat">${nCoperte}/${sorted.length} tappe con alloggio prenotato</div>`);
  }
  html+='<button class="add-leg" style="margin-top:8px" onclick="openTappaForm()">+ Aggiungi tappa</button>';
  return html;
}

// ---------- VOLI: parsing e rendering ----------
function parseTratte(raw){
  let o={andata:[],ritorno:[]};
  if(!raw) return o;
  try{ const j=typeof raw==='string'?JSON.parse(raw):raw; o.andata=j.andata||[]; o.ritorno=j.ritorno||[]; }catch(e){}
  return o;
}
function flightRoute(legs){
  if(!legs.length) return '—';
  return legs[0].da + ' → ' + legs[legs.length-1].a + (legs.length>1?` (${legs.length-1} scalo${legs.length>2?'i':''})`:'');
}
function altTimes(dateStr, timeStr, localTz, homeTz, destTz){
  // restituisce le conversioni verso casa e destinazione, saltando quella uguale al fuso locale
  const out=[];
  [['home',homeTz],['dest',destTz]].forEach(([k,tz])=>{
    if(!tz || tz===localTz) return;                 // salta se coincide col fuso della tappa
    const r = localToHome(dateStr,timeStr,localTz,tz);
    if(r) out.push(`${r.flag} ${r.time}`);
  });
  // dedup (se casa e dest sono lo stesso fuso)
  return [...new Set(out)];
}
function renderTratteBlock(titolo, legs, homeTz, destTz){
  if(!legs.length) return '';
  let h=`<div class="fl-block"><div class="fl-title">${titolo==='Andata'?'✈️ Andata':'🔙 Ritorno'}</div>`;
  legs.forEach((lg,i)=>{
    const tzD=tzOf(lg.da), tzA=tzOf(lg.a);
    const altDep = tzD ? altTimes(lg.data_dep,lg.ora_dep,tzD,homeTz,destTz) : [];
    const altArr = tzA ? altTimes(lg.data_arr,lg.ora_arr,tzA,homeTz,destTz) : [];
    const vol = durBetween(lg.data_dep,lg.ora_dep,tzD,lg.data_arr,lg.ora_arr,tzA);
    const depAlt = altDep.length?` <span class="home">(${altDep.join(' · ')})</span>`:'';
    const arrAlt = altArr.length?` <span class="home">(${altArr.join(' · ')})</span>`:'';
    h+=`<div class="fl-leg">`
     + `<div class="fl-row"><span class="ap">🛫 ${esc(lg.da)}</span><span class="tm">${esc(fdate(lg.data_dep))} · ${esc(lg.ora_dep||'—')}${depAlt}</span></div>`
     + (vol?`<div class="fl-dur">✈️ ${vol}</div>`:'')
     + `<div class="fl-row"><span class="ap">🛬 ${esc(lg.a)}</span><span class="tm">${esc(fdate(lg.data_arr))} · ${esc(lg.ora_arr||'—')}${arrAlt}</span></div>`
     + `</div>`;
    if(i<legs.length-1){
      const nx=legs[i+1];
      const sc=durBetween(lg.data_arr,lg.ora_arr,tzA,nx.data_dep,nx.ora_dep,tzOf(nx.da));
      h+=`<div class="fl-scalo">⏳ scalo ${sc||'—'}</div>`;
    }
  });
  h+=`</div>`;
  return h;
}

  $('f-sito').value=r.sito_prenotazione||''; $('f-link').value=r.link||'';
  $('f-prezzo').value=r.prezzo??''; $('f-prezzoloc').value=r.prezzo_locale??''; $('f-valuta').value=r.valuta||'';
  $('f-scad').value=isoToDdmm(r.scadenza_cancellazione);
  $('f-noncancellabile').checked=!!r.non_cancellabile; toggleScadField();
  $('f-statopag').value = r.stato_pagamento || (r.pagato?'pagato':'dapagare');
  $('f-acconto').value = r.acconto??'';
  $('f-datapagamento').value=isoToDdmm(r.data_pagamento);
  $('f-valutacanc').checked=!!r.valuta_cancellazione;
  $('f-esclusototale').checked=!!r.escluso_totale;
  $('f-daprenotare').checked=!!r.da_prenotare;
  $('f-note').value=r.note||'';
  // apro le aggiuntive se contengono dati valorizzati
  const hasExtra = r.link||r.tipo_sistemazione||r.ora_inizio||r.colazione&&r.colazione!=='no'||r.prezzo_locale||r.note||r.valuta_cancellazione||r.escluso_totale;
  $('more-fields').classList.toggle('hide', !hasExtra);
  $('more-toggle').innerHTML=(hasExtra?'▾':'▸')+' Informazioni aggiuntive';
  togglePayField(); toggleDaPrenotare();
  attachDateMask();
  $('overlay').classList.add('show');
}
function closeForm(){ $('overlay').classList.remove('show'); }

async function save(){
  const tipo=$('f-tipo').value;
  const nome=$('f-nome').value.trim();
  if(!nome){ alert('Inserisci il nome'); return; }
  const daPrenotare = (tipo==='alloggio'||tipo==='attivita') && $('f-daprenotare').checked;
  const statoPag = daPrenotare ? 'dapagare' : $('f-statopag').value;  // dapagare|acconto|pagato|inloco
  const pagato = statoPag==='pagato';
  const acconto = statoPag==='acconto' ? (Number($('f-acconto').value)||0) : 0;

  // Voli: raccolgo le tratte
  let tratteJson=null, voloDataInizio=null, voloDa=null, voloA=null;
  if(tipo==='volo'){
    const andata=collectLegs('andata');
    const ritorno=$('f-andataritorno').checked?collectLegs('ritorno'):[];
    tratteJson={andata,ritorno};
    voloDataInizio = andata[0]?andata[0].data_dep:null;
    voloDa = andata[0]?andata[0].da:null;
    voloA = andata.length?andata[andata.length-1].a:null;
  }

  const prezzo = daPrenotare ? 0 : ($('f-prezzo').value?Number($('f-prezzo').value):0);

  // Risolvo la tappa collegata (alloggi e attività)
  let tappaId=null, tappaNome=null;
  if(tipo==='alloggio' || tipo==='attivita'){
    const sel=$('f-tappaid').value;
    if(sel==='__new'){
      const nuovoNome=$('f-tappa').value.trim();
      if(nuovoNome){
        try{
          const { data:created } = await db.from(TABLE_TAPPE).insert({
            viaggio_id: currentTrip?currentTrip.id:null, nome:nuovoNome,
            data_inizio:ddmmToIso($('f-inizio').value), data_fine:ddmmToIso($('f-fine').value)
          }).select();
          if(created && created[0]){ tappaId=created[0].id; }
          tappaNome=nuovoNome;
        }catch(e){ tappaNome=nuovoNome; }
      }
    } else if(sel){
      const t=tappe.find(x=>x.id===sel);
      tappaId=sel; tappaNome=t?t.nome:null;
    }
  }

  const rec={
    viaggio_id: currentTrip ? currentTrip.id : null,
    tipo:tipo,
    nome_hotel:nome,
    tappa: (tipo==='alloggio'||tipo==='attivita')?(tappaNome||$('f-tappa').value.trim()||null):null,
    tappa_id: (tipo==='alloggio'||tipo==='attivita')?tappaId:null,
    tipo_sistemazione: tipo==='alloggio'?($('f-sistemazione').value.trim()||null):null,
    ora_inizio: tipo==='alloggio'?($('f-orainizio').value||null):null,
    ora_fine: tipo==='alloggio'?($('f-orafine').value||null):null,
    colazione: tipo==='alloggio'?$('f-colazione').value:'no',
    colazione_prezzo: (tipo==='alloggio'&&$('f-colazione').value==='pagamento')?($('f-colazioneprezzo').value.trim()||null):null,
    partenza: voloDa,
    arrivo: voloA,
    compagnia: tipo==='volo'?($('f-compagnia').value.trim()||null):null,
    tratte: tipo==='volo'?tratteJson:null,
    luogo: tipo==='attivita'?($('f-luogo').value.trim()||null):null,
    durata: tipo==='attivita'?($('f-durata').value.trim()||null):null,
    data_inizio: tipo==='volo'?voloDataInizio:ddmmToIso($('f-inizio').value),
    data_fine: tipo==='alloggio'?ddmmToIso($('f-fine').value):null,
    sito_prenotazione:$('f-sito').value.trim()||null,
    link:$('f-link').value.trim()||null,
    prezzo:prezzo,
    prezzo_locale:$('f-prezzoloc').value?Number($('f-prezzoloc').value):null,
    valuta:$('f-valuta').value.trim().toUpperCase()||null,
    pagato:pagato,
    stato_pagamento:statoPag,
    acconto:acconto,
    scadenza_cancellazione: (tipo==='alloggio' && !$('f-noncancellabile').checked && !daPrenotare)?ddmmToIso($('f-scad').value):null,
    non_cancellabile: tipo==='alloggio'?$('f-noncancellabile').checked:false,
    data_pagamento: (statoPag==='dapagare'||statoPag==='acconto')&&!daPrenotare?ddmmToIso($('f-datapagamento').value):null,
    valuta_cancellazione: tipo==='alloggio'?$('f-valutacanc').checked:false,
    escluso_totale: daPrenotare ? true : $('f-esclusototale').checked,
    da_prenotare: daPrenotare,
    note: $('f-note').value.trim()||null
  };
  const id=$('f-id').value;
  $('save-btn').textContent='…';
  const { error } = id
    ? await db.from(TABLE).update(rec).eq('id',id)
    : await db.from(TABLE).insert(rec);
  $('save-btn').textContent='Salva';
  if(error){ alert('Errore: '+error.message); return; }
  closeForm(); load();
}

$('overlay').addEventListener('click',e=>{ if(e.target===$('overlay')) closeForm(); });
$('overlay-trip').addEventListener('click',e=>{ if(e.target===$('overlay-trip')) closeTripForm(); });
$('overlay-tappa').addEventListener('click',e=>{ if(e.target===$('overlay-tappa')) closeTappaForm(); });

// ---------- Avvio sicuro ----------
let __initTries=0;
window.__initApp=function(){
  if(db) return;                      // già inizializzato
  if(typeof supabase==='undefined' || !supabase.createClient){
    // libreria non ancora pronta: riprovo per ~10s, poi mostro errore
    __initTries++;
    if(__initTries>50){
      const el=$('trips-status'); if(el) el.innerHTML='⚠️ Impossibile caricare la libreria Supabase. Controlla la connessione internet e ricarica la pagina.';
      return;
    }
    return setTimeout(window.__initApp,200);
  }
  try{
    db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }catch(e){
    const el=$('trips-status'); if(el) el.innerHTML='⚠️ Errore di configurazione Supabase: '+esc(e.message||String(e));
    return;
  }
  goTrips();
};
window.__initApp();
